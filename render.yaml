services:
  - type: web
    name: aibtc-cyber-comet
    runtime: node
    buildCommand: npm install
    startCommand: npm run start:web
    envVars:
      - key: CLIENT_MNEMONIC
        sync: false
      - key: NODE_ENV
        value: production
      - key: NEWS_BOT_CRON
        value: "5 */4 * * *"
      - key: NEWS_BOT_TIMEZONE
        value: UTC
      - key: NETWORK
        value: mainnet
